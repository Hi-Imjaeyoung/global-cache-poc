server:
  port: 8081 # 쓰기 서버는 8081 포트로 실행

spring:
  application:
    name: command-api
  datasource:
    url: jdbc:mysql://localhost:3306/growup_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/